<!doctype html>
<html lang="en">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Django Files Screen Shots</title>

    <meta name="author" content="Shane"/>
    <meta name="title" content="Django Files Screen Shots"/>

    <meta property="og:author" content="Shane">

<body>

<div style="--swiper-navigation-color: #fff; --swiper-pagination-color: #fff" class="swiper mySwiper2">
    <div class="swiper-wrapper" id="swiper-shots">
<!--        <div class="swiper-slide"><img src="screenshots/01_Login.png" alt="01_Login.png"></div>-->
    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
</div>
<div thumbsSlider="" class="swiper mySwiper">
    <div class="swiper-wrapper" id="swiper-thumbs">
<!--        <div class="swiper-slide"><img src="screenshots/01_Login.png" alt="01_Login.png"></div>-->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
